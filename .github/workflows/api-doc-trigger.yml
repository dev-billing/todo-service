name: API Doc Generation

on:
  pull_request:
    types: [opened, synchronize, closed]
    branches:
      - master
      - develop

  workflow_dispatch:
    inputs:
      branch:
        description: "코드를 읽을 브랜치"
        required: true
        default: "master"
      http_method:
        description: "HTTP 메서드 (GET, POST, PUT, DELETE, PATCH)"
        required: true
      api_paths:
        description: "쉼표로 구분된 REST API URL 경로 (예: /api/v1/orders,/api/v1/payments)"
        required: true
      url_hint:
        description: "위키 경로 힌트 (internal / external / 비워두면 자동)"
        required: false
        default: ""

jobs:
  # ── PR open/synchronize: 변경된 API draft 자동 생성 ──────────────────────
  generate-pr-drafts:
    name: Generate PR API Doc Drafts
    if: |
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'synchronize')
    uses: dev-billing/shared-workflows/.github/workflows/reusable-generate-pr-drafts.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
      repo_name: ${{ github.repository }}
      mode: "draft"
    secrets: inherit

  # ── PR merge: 삭제된 API deprecated 처리 ─────────────────────────────────
  handle-deprecated-on-merge:
    name: Handle Deprecated APIs on Merge
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    uses: dev-billing/shared-workflows/.github/workflows/reusable-generate-pr-drafts.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
      repo_name: ${{ github.repository }}
      mode: "deprecated"
    secrets: inherit

  # ── 수동 실행: 코드 기반 draft 생성 → approve → publish ─────────────────
  create-draft-from-code:
    name: Create Draft from Code
    if: github.event_name == 'workflow_dispatch'
    uses: dev-billing/shared-workflows/.github/workflows/reusable-create-draft-from-code.yml@main
    with:
      repo_name: ${{ github.repository }}
      branch: ${{ inputs.branch }}
      http_method: ${{ inputs.http_method }}
      api_paths: ${{ inputs.api_paths }}
      url_hint: ${{ inputs.url_hint }}
    secrets: inherit

  wait-approval:
    name: "[검토] Dooray Draft 확인 후 Approve"
    needs: create-draft-from-code
    if: github.event_name == 'workflow_dispatch'
    environment: api-doc-approval
    runs-on:
      group: billing-dev
    steps:
      - name: 안내
        run: |
          echo "Draft URL: ${{ needs.create-draft-from-code.outputs.page_url }}"
          echo "Dooray Draft를 검토한 뒤 이 화면에서 Approve를 눌러주세요."

  publish-final:
    name: Publish to Dooray Wiki
    needs: [create-draft-from-code, wait-approval]
    if: github.event_name == 'workflow_dispatch'
    uses: dev-billing/shared-workflows/.github/workflows/reusable-publish-final.yml@main
    with:
      api_key: ${{ needs.create-draft-from-code.outputs.api_key }}
      repo_name: ${{ github.repository }}
      draft_page_id: ${{ needs.create-draft-from-code.outputs.draft_page_id }}
    secrets: inherit
