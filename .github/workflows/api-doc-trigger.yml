name: API Doc Auto Generation

on:
  # PR merge 시 자동 트리거 (삭제된 API Deprecated 처리)
  pull_request:
    types: [closed]
    branches:
      - master
      - develop

  # 신규 API 문서 수동 생성 (코드 기반)
  workflow_dispatch:
    inputs:
      branch:
        description: "코드를 읽을 브랜치"
        required: true
        default: "master"
      http_method:
        description: "HTTP 메서드 (GET, POST, PUT, DELETE, PATCH)"
        required: true
      api_paths:
        description: "쉼표로 구분된 REST API URL 경로 (예: /api/v1/orders,/api/v1/payments)"
        required: true
      url_hint:
        description: "위키 경로 힌트 (internal / external / 비워두면 자동)"
        required: false
        default: ""

jobs:
  # ── PR merge 자동 트리거: 삭제된 엔드포인트 감지 ──────────────────────
  detect-deleted:
    name: Detect Deleted Endpoints
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    uses: dev-billing/shared-workflows/.github/workflows/reusable-doc-from-diff.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
      repo_name: ${{ github.repository }}
    secrets: inherit

  handle-deprecated:
    name: Handle Deprecated APIs
    needs: detect-deleted
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      needs.detect-deleted.outputs.has_deleted_endpoints == 'true'
    uses: dev-billing/shared-workflows/.github/workflows/reusable-deprecated-handler.yml@main
    with:
      repo_name: ${{ github.repository }}
      deleted_endpoints: ${{ needs.detect-deleted.outputs.deleted_endpoints }}
    secrets: inherit

  # ── 수동 실행: 코드 기반 문서 생성 ────────────────────────────────────
  generate-from-code:
    name: Generate Doc from Code
    if: github.event_name == 'workflow_dispatch'
    uses: dev-billing/shared-workflows/.github/workflows/reusable-doc-from-code.yml@main
    with:
      repo_name: ${{ github.repository }}
      branch: ${{ inputs.branch }}
      http_method: ${{ inputs.http_method }}
      api_paths: ${{ inputs.api_paths }}
      url_hint: ${{ inputs.url_hint }}
    secrets: inherit

  create-draft-code:
    name: Create Dooray Draft (Code)
    needs: generate-from-code
    if: github.event_name == 'workflow_dispatch'
    uses: dev-billing/shared-workflows/.github/workflows/reusable-publish-to-dooray.yml@main
    with:
      title: ${{ needs.generate-from-code.outputs.title }}
      doc_content: ${{ needs.generate-from-code.outputs.doc_content }}
      url_hint: ${{ needs.generate-from-code.outputs.url_hint }}
      api_key: ${{ needs.generate-from-code.outputs.api_key }}
      repo_name: ${{ github.repository }}
    secrets: inherit

  wait-approval-code:
    name: "[검토] Dooray Draft 확인 후 Approve"
    needs: create-draft-code
    if: github.event_name == 'workflow_dispatch'
    environment: api-doc-approval
    runs-on:
      group: billing-dev
    steps:
      - name: 안내
        run: echo "Dooray Draft를 검토한 뒤 이 화면에서 Approve를 눌러주세요."

  publish-final-code:
    name: Publish to Dooray Wiki (Code)
    needs: [generate-from-code, create-draft-code, wait-approval-code]
    if: github.event_name == 'workflow_dispatch'
    uses: dev-billing/shared-workflows/.github/workflows/reusable-publish-final.yml@main
    with:
      api_key: ${{ needs.create-draft-code.outputs.api_key }}
      repo_name: ${{ github.repository }}
    secrets: inherit
