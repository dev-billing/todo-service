name: API Doc Publish

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: "publish할 API 키 (예: GET /api/v1/todos)"
        required: true

jobs:
  publish:
    name: Publish to Dooray Wiki
    uses: dev-billing/shared-workflows/.github/workflows/reusable-publish-final.yml@main
    with:
      api_key: ${{ inputs.api_key }}
      repo_name: ${{ github.repository }}
    secrets: inherit
