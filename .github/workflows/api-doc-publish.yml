name: API Doc Publish

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: "publish할 API 키 (예: GET /api/v1/todos)"
        required: true
      draft_page_id:
        description: "Dooray Draft 페이지 ID (registry에 없을 때만 입력)"
        required: false
        default: ""

jobs:
  publish:
    name: Publish to Dooray Wiki
    uses: dev-billing/shared-workflows/.github/workflows/reusable-publish-final.yml@main
    with:
      api_key: ${{ inputs.api_key }}
      repo_name: ${{ github.repository }}
      draft_page_id: ${{ inputs.draft_page_id }}
    secrets: inherit
