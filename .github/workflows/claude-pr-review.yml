name: 🤖 Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:          # ← 수동 트리거
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write   # ← 추가
    uses: Billing-Review/Billing-Review/.github/workflows/claude-review.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
      repo_name: ${{ github.repository }}
      manual_trigger: ${{ github.event_name == 'workflow_dispatch' && true || false }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ORG_GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}